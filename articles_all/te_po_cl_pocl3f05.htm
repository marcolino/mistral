<nuovacolombia@yahoo.it - 3 giugno 2003 DENUNCIA DALLA COLOMBIA, AZIONE URGENTE! DETENUTO E DESAPARECIDO DAI GRUPPI PARAMILITARI IL CONTADINO ENRIQUE VALENCIA L'Associazione Contadina della Valle del fiume Cimitarra, ACVC, denuncia alla
comunità nazionale ed internazionale la detenzione e la sparizione del
contadino Enrique Valencia. FATTI Martedì 27 maggio 2003, alle 9.45 circa, il contadino Enrique Valencia è stato
bloccato e poi fatto sparire da gruppi paramilitari, mentre si stava recando su
una scialuppa per passeggeri, proveniente dalla città di Barrancabermeja, nella
Valle del fiume Cimitarra. I fatti sono avvenuti all'altezza di una località conosciuta come La Rompida,
sul fiume Magdalena, nella giurisdizione del Municipio di Yondó, dipartimento
di Antioquia. PRECEDENTI La ACVC ha denunciato insistentemente, da tre anni a questa parte, la presenza
costante e quasi permanente di questo posto di blocco paramilitare in località
La Rompida, a pochi minuti d'imbarcazione dalla città di Barrancabermeja e
della postazione di controllo dell'Armata Nazionale sul fiume Magdalena. Tali denuncie non hanno ricevuto risposta alcuna, da parte dello Stato,
indirizzata a neutralizzare gli squadroni della morte collocati nella suddetta
località, dove sono state assassinate e fatte sparire numerose persone, come
segnalato da precedenti denuncie dell'ACVC. Al contrario, i posti di blocco
paramilitari si sono moltiplicati ed è aumentato il blocco paramilitare alla
regione della Valle del fiume Cimitarra. A differenza delle versioni ufficiali, che pretendono di occultare la presenza
ed il controllo dei paramilitari, l'ACVC ratifica che i paramilitari continuano
a lanciare le loro azioni dai centri urbani di Barrancabermeja, Yondó, San Pablo,
Puerto Berrío e Remedios verso le zone rurali della regione, che hanno come
vittime i contadini che vengono assassinati, fatti sparire e taglieggiati. ESIGIAMO DALLO STATO COLOMBIANO CHE: 1. Ritrovi e restituisca sano e salvo il contadino Enrique Valencia. 2. Neutralizzi l'agire impunito degli squadroni della morte del paramilitarismo
nel Magdalena Medio. 3. Smantelli i posti di blocco paramilitari collocati nei pressi delle aree
urbane e delle guarnigioni militari della regione. 27 maggio del 2003 Associazione Contadina della Valle del fiume Cimitarra, ACVC CHIEDIAMO A TUTTI I SETTORI DEL MOVIMENTO CONTRO LE GUERRE, SINDACATI,
