<vocedelgamadi@yahoogroups.com L'articolo che segue appare sul numero di giugno 2005 de LA VOCE del G.A.MA.DI. Questioni della Scienza - a cura di A. Martocchia Il papa teologo e il "Relativismo culturale" Per giorni e settimane siamo stati sommersi da commenti e previsioni sulla
politica del nuovo papa. Un argomento su cui si sono soffermati molti
commentatori, con toni spesso molto rispettosi, e a volte anche servili, è
l'anatema lanciato dal papa contro il cosiddetto "Relativismo culturale".
Ne ha parlato tra gli altri l'ex rivoluzionario pentito Adriano Sofri dalle
colonne della "Repubblica" del 26 aprile, nel suo solito stile
insopportabilmente logorroico inconcludente e narcisistico, e l'ex
intellettuale comunista Mario Tronti, oggi collaboratore del Centro per la
Riforma dello Stato, in un intervista al "Manifesto" del 29 aprile
dai toni estremamente moderati e possibilisti verso la cultura cattolica. Sofri, tra dotte citazioni del Vangelo, interminabili giri di parole, e
richiami al padre del socialismo revisionista, Eduard Bernstein, sembra optare
per una generica tolleranza culturale che eviti la contrapposizione tra due
visioni fortemente caratterizzate del mondo, "opposte e insieme
simmetriche e forse alleabili, l'assolutezza cattolica e quella
materialistica". Tronti dichiara che il sentimento religioso, coi suoi valori, potrebbe avere il
risvolto positivo di frenare l'eccessiva tendenza dell'umanità verso il consumo
di nuovi prodotti generati dalla troppo rapida innovazione tecnologica.  Dichiara anche che "una fede
forte"  come quella voluta da Ratzinger  "è tutt'altro che una fede
violenta" e definisce la "critica al relativismo" fatta dal papa
come "una critica del pensiero debole, quello che sostiene che non ci sono
fatti ma solo interpretazioni". Vogliamo partire proprio da quest'ultima definizione di Tronti, che riteniamo
sostanzialmente corretta, per ricordare che anche noi materialisti
dialettici  siamo contrari al
"pensiero debole": riteniamo che esistano al di fuori di noi, e
indipendentemente da noi, una realtà e delle verità oggettive, che non sono
frutto, cioè, solo della nostra mente, e delle nostre interpretazioni di vaghe
sensazioni. Sotto questo aspetto, una cosa giusta l'ha detta anche Sofri quando
ha ricordato che anche chi non ha fede e non crede in Verità Assolute può
"riconoscere un verità come oggettiva  per esempio che la terra esistesse
anche prima della presenza umana". Pensiamo che l'umanità, attraverso il ragionamento e la pratica del lavoro che
trasforma la natura che ci circonda e ce la fa conoscere, possa avere una
visione sempre più approfondita, anche se incompleta, della realtà. Il
materialista dialettico sa che non esistono Verità valide dovunque e
immutabili, perché la realtà è in continua trasformazione, ed anche le nostre
conoscenze sono in continua evoluzione, ma che attraverso gli studi e gli
esperimenti dello scienziato, o il lavoro del contadino che getta il seme e ha
imparato che l'anno seguente nascerà il grano, si può progressivamente giungere
a capire sempre meglio il mondo incredibilmente complesso che ci circonda e le
sue leggi. In questo sforzo titanico l'uomo è solo con la sua intelligenza e la
sua capacità di lavoro, doti che ha in comune anche con gli animali, anche se
in misura diversa. Non esistono Verità Rivelate o interventi provvidenziali. Qui bisogna essere
estremamente chiari: o si crede che un dio, figlio di una donna vergine,
facente parte di una triade divina, sia venuto a salvare l'umanità, sia morto e
sia risuscitato il terzo giorno, e che in un ostia di cereali ci sia il suo
sangue e la sua carne, e che le sue immagini, e le immagini della madre
vergine, e gli uomini da lui eletti a santi possano compiere miracoli, o non ci
si crede e si fa appello alla ragione come dai tempi dell'illuminismo, e ancor
prima  del razionalismo greco antico. Naturalmente, non possiamo dar credito nemmeno a qualsiasi altro sistema
dogmatico, anche di natura non religiosa, come quello di Platone che pensava
esistessero modelli della realtà fissi e immutabili (le "idee"), o
quello di Parmenide che riteneva che ciò che esiste deve essere eterno e
immutabile, o anche quello del grande Kant, che riteneva che le categorie della
nostra mente, come lo spazio e il tempo, avessero un valore assoluto, non capendo
che esse possono mutare con l'evolversi delle nostre conoscenze e che la nostra
stessa mente si trasforma continuamente essendo un prodotto dell'evoluzione
della specie. Come ben sapevano non solo Engels o Lenin, ma anche grandi poeti materialisti come
Lucrezio o Leopardi, l'uomo fa parte della natura, ma ha imparato a
distinguersi da essa e a penetrarne la realtà oggettiva con le sue sole forze
intellettuali e materiali. (a cura di V. Brandi)
