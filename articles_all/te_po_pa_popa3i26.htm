Barghouti Il Coordinamento nazionale dei giuristi democratici promuove questo Appello per
l'assoluzione e la liberazione di Marwan Barghouti, uno dei dirigenti più
stimati dai Palestinesi che, se fosse libero, potrebbe avere un ruolo
importante nella situazione attuale. Pur rinchiuso nelle carceri israeliane, ha
favorito recentemente l'accordo sulla tregua, poi vanificato dalla
continuazione della politica delle "esecuzioni mirate" di Sharon. Marwan Barghouti non e' un terrorista, ma un combattente per la liberta' del
suo paese. Si puo' aderire, mandando una e-mail a: info@giuristidemocratici.it Appello per l'assoluzione e la liberazione
immediata di Marwan Barghouti Marwan Barghouti, leader di Al Fatah per la Cisgiordania, membro del Parlamento
palestinese e uno degli autori degli Accordi di pace di Oslo, e' stato rapito
nell'aprile 2002 dalle Forze armate israeliane ed e' attualmente sottoposto a
processo penale a Tel Aviv con accuse di terrorismo e altri gravi crimini. Siamo profondamente convinti, sulla base dei rapporti degli osservatori e dei giuristi
internazionali che hanno assistito alle varie fasi del processo, che tali
accuse manchino di ogni base di fatto. Si tratta quindi di un processo
puramente politico. Barghouti viene processato in quanto si tratta di uno dei
leader palestinesi piu' popolari ed importanti. Cio' e' confermato fra l'altro dal fatto che la Procura israeliana ha
dichiarato in varie occasioni che egli e' un terrorista; tali dichiarazioni
costituiscono la prova di un grave pregiudizio nei suoi confronti. Pertanto il giudizio appare sprovvisto di ogni obiettività. Inoltre la detenzione e il processo a Barghouti appaiono in flagrante
contraddizione con varie norme di diritto internazionale, contenute, fra
l'altro, nella IV Convenzione di Ginevra del 1949 e negli accordi fra Israele e
Palestina. Ciononostante noi esprimiamo il nostro forte auspicio che la Corte
israeliana non si renda complice del piano di criminalizzazione di Barghouti,
la cui realizzazione ovviamente nuocerebbe alla pace e al rispetto dei principi
dello Stato di diritto nell'area. Chiediamo quindi con urgenza la piena assoluzione e l'immediata liberazione del
leader palestinese, il cui ruolo di costruttore di pace e' stato confermato
anche dai recenti negoziati nel quadro della road-map. Coordinamento nazionale dei giuristi
